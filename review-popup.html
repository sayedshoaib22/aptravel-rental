<div id="review-popup-overlay" class="review-popup-overlay" aria-hidden="true">
  <div class="review-popup-panel" role="dialog" aria-modal="true" aria-label="Google Review Popup" tabindex="-1">
    <button type="button" class="review-popup-close" aria-label="Close review popup">×</button>

    <div class="review-popup-illustration">
      <img src="/assets/images/blue-star.webp" alt="Decorative star graphic" aria-hidden="true" />
    </div>

    <div class="review-popup-header">
      <p class="review-popup-eyebrow">⭐ Enjoying AP Travel & Rental?</p>
      <h2>Share your feedback with a Google review.</h2>
      <p>Your feedback helps us improve. Please leave us a Google review.</p>
    </div>

    <div class="review-popup-actions">
      <a href="https://maps.app.goo.gl/YL9VJGDTUyHfHasf9" class="review-popup-primary" data-action="write-review" target="_blank" rel="noopener noreferrer">⭐ Write a Review</a>
      <button type="button" class="review-popup-secondary" data-action="maybe-later">Maybe Later</button>
      <button type="button" class="review-popup-tertiary" data-action="never-show">Never Show Again</button>
    </div>
  </div>
</div>
